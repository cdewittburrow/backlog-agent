name: Backlog Pipeline

on:
  push:
    branches: [main]
    paths: ['ideas/**']
  schedule:
    - cron: '17 * * * *'  # hourly fallback, off the :00 mark
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false  # queue, don't cancel in-flight runs

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[pipeline]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --print --dangerously-skip-permissions "$(cat prompts/daily.md)"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ideas/
          git diff --cached --quiet || git commit -m "chore: pipeline run $(date -u +%Y-%m-%d) [pipeline]"
          git push
