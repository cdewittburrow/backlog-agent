name: Repo → Notion

on:
  push:
    branches: [main]
    paths: ['ideas/**']
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Sync all idea files (not just latest diff)'
        required: false
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip commits made by notion-to-repo to avoid unnecessary API calls
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[notion-sync]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Get changed idea files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES=$(ls ideas/*.md 2>/dev/null | grep -v '.gitkeep' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD | grep '^ideas/' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Sync to Notion
        if: steps.changed.outputs.files != ''
        run: node scripts/repo-to-notion.js ${{ steps.changed.outputs.files }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
