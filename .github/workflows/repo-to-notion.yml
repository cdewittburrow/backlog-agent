name: Repo → Notion

on:
  push:
    branches: [main]
    paths: ['ideas/**']

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip commits made by notion-to-repo to avoid unnecessary API calls
    if: "!contains(github.event.head_commit.message, '[notion-sync]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Get changed idea files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | grep '^ideas/' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Sync to Notion
        if: steps.changed.outputs.files != ''
        run: node scripts/repo-to-notion.js ${{ steps.changed.outputs.files }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
